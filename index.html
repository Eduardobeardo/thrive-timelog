<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="mobile-web-app-capable" content="yes"/>

  <title>TIMELOG v9 — Thrive Architecture</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0d0d0d; color: #e8e2d9; font-family: 'DM Mono', monospace; overflow-x: hidden; }
    button { font-family: 'DM Mono', monospace; }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.15);opacity:0.7} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes ripple { 0%{transform:scale(1);opacity:0.6} 100%{transform:scale(2.5);opacity:0} }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    #app { min-height: 100vh; display: flex; flex-direction: column; }

    header {
      border-bottom: 1px solid #222;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0;
      background: #0d0d0d;
      z-index: 10;
    }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; letter-spacing: 0.15em; color: #f5e642; }
    .subhead { font-size: 10px; color: #555; letter-spacing: 0.08em; margin-top: 2px; }
    .hist-btn {
      background: transparent; border: 1px solid #222; border-radius: 4px;
      color: #666; font-size: 11px; padding: 6px 14px; cursor: pointer;
      letter-spacing: 0.08em;
    }

    main {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 24px 80px;
      max-width: 600px; margin: 0 auto; width: 100%;
    }

    .screen { width: 100%; text-align: center; animation: fadeUp 0.35s ease; }
    .screen.left { text-align: left; }

    /* Permission banner */
    .perm-banner {
      background: #161616; border: 1px solid #2a2a2a;
      border-left: 3px solid #f5e642; border-radius: 6px;
      padding: 16px 20px; margin-bottom: 28px; text-align: left;
    }
    .perm-banner.denied { background: #1a0a0a; border-color: #e04040; border-left-color: #e04040; }
    .perm-title { font-family: 'Syne',sans-serif; font-weight: 700; font-size: 12px; color: #f5e642; letter-spacing: 0.08em; margin-bottom: 8px; }
    .perm-title.denied { color: #e04040; }
    .perm-text { font-size: 12px; color: #666; line-height: 1.7; margin-bottom: 14px; }
    .perm-text.denied { margin-bottom: 0; }
    .allow-btn {
      padding: 10px 20px; background: #f5e642; border: none; border-radius: 4px;
      color: #0d0d0d; font-family: 'Syne',sans-serif; font-weight: 800;
      font-size: 11px; letter-spacing: 0.1em; cursor: pointer;
    }

    /* Big mic button */
    .mic-wrap { position: relative; display: inline-block; margin-bottom: 32px; }
    .mic-btn {
      width: 140px; height: 140px; border-radius: 50%;
      background: #f5e642; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 8px;

    .mic-btn:disabled { background: #1a1a1a; box-shadow: none; cursor: not-allowed; }
    .mic-btn svg { display: block; }
    .mic-label { font-family: 'Syne',sans-serif; font-weight: 700; font-size: 11px; color: #0d0d0d; letter-spacing: 0.1em; }
    .mic-btn:disabled .mic-label { color: #444; }

    .hint { color: #3a3a3a; font-size: 12px; line-height: 1.8; letter-spacing: 0.04em; }

    .ring {
      position: absolute; inset: 0; border-radius: 50%;

      pointer-events: none;

    /* Stop button */

<div id="app">
  <header>
    <div>
      <div class="logo">TIMELOG <span style="font-size:10px;opacity:0.5">v6</span></div>
      <div class="subhead" id="dateLabel"></div>
    </div>
    <button class="hist-btn" id="histBtn" onclick="toggleHistory()">HISTORY</button>
  </header>
  <main id="main"></main>
</div>

<script>
const STAFF_ID = 7808683;
const ANTHROPIC_KEY = ""; // Leave blank — handled by Claude.ai proxy when running inside Claude

let state = {
  screen: "idle",       // idle | listening | thinking | confirm | stagepick | logging | success | error | history
  projects: [],
  loadingProjects: true,
  micPermission: "unknown",
  transcript: "",
  interimText: "",
  match: null,
  stages: [],
  selectedStageId: null,
  errorMsg: "",
  history: [],
  recognition: null,
  prevScreen: "idle",
};

// ── Helpers ──────────────────────────────────────────────────────────────────
function fmt(date) { return date.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}); }
function fmtDate(date) { return date.toLocaleDateString([],{weekday:"long",month:"long",day:"numeric"}); }
function todayKey() { const d=new Date(); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; }
function todayInt() { const d=new Date(); return parseInt(`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`); }

document.getElementById("dateLabel").textContent = `Thrive Architecture · ${fmtDate(new Date())}`;

// ── API ───────────────────────────────────────────────────────────────────────
// Direct calls to Total Synergy via CORS proxy
const SYNERGY_BASE = "https://api.totalsynergy.com/api/v2/Organisation/thrivearchitecture";
const ACCESS_TOKEN = "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJlbWFpbCI6ImVkd2FyZEB0aHJpdmVhcmNoaXRlY3R1cmUuY29tLmF1IiwiYXBwbGljYXRpb25pZCI6MCwidXNlcm5hbWUiOiJFZHdhcmRIaWdodG9uIiwidGVuYW50IjoiIiwiY29kZV9leHBpcmVzIjo2Mzk0MzExNjUzOTAwMDUxNTksInVzZXJfdHlwZSI6IjIifQ.EXIR-TZ1CEY8Vosk36Xp4TIH2JLBtFfsd7Cg-3EfaM8";

function netlifyUrl(path) {
  // Route through corsproxy.io to bypass CORS
  const [base, qs] = path.split("?");
  const target = SYNERGY_BASE + base + (qs ? "?" + qs : "");
  return "https://corsproxy.io/?" + encodeURIComponent(target);
}

async function synergyGet(path) {
  const r = await fetch(netlifyUrl(path), {
    headers: {
      "access-token": ACCESS_TOKEN,
      "Content-Type": "application/json",
      "x-requested-with": "XMLHttpRequest",
    }
  });
  if (!r.ok) throw new Error(`API ${r.status}: ${await r.text()}`);
  return r.json();
}

async function synergyFetch(method, path, body) {
  const [base, qs] = path.split("?");
  const target = SYNERGY_BASE + base + (qs ? "?" + qs : "");
  const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(target);

  // Sanitise body - strip zero/null IDs
  let cleanBody = undefined;
  if (body) {
    const arr = Array.isArray(body) ? body : [body];
    const sanitised = arr.map(entry => {
      const clean = {};
      for (const [k, v] of Object.entries(entry)) {
        if (v === null || v === undefined) continue;
        if (typeof v === "number" && v <= 0 && k !== "units") continue;
        clean[k] = v;
      }
      return clean;
    });
    cleanBody = JSON.stringify(sanitised);
  }

  const r = await fetch(proxyUrl, {
    method,
    headers: {
      "access-token": ACCESS_TOKEN,
      "Content-Type": "application/json",
      "x-requested-with": "XMLHttpRequest",
    },
    body: cleanBody,
  });
  const text = await r.text();
  if (!r.ok) throw new Error(`API ${r.status}: ${text.slice(0, 200)}`);
  return { ok: true, text };
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  loadHistory();
  checkMicPermission();
  await loadProjects();
  render();
}

async function loadProjects() {
  state.loadingProjects = true;
  state.projectsRaw = null;
  state.projectsError = null;

  // Try multiple endpoints and log everything for debugging
  const attempts = [
    "/Projects?criteria.pagesize=100&criteria.isActive=true",
    "/Projects?criteria.pagesize=100",
    "/Projects/OfficeProjectsForSelection",
    "/Projects/TimesheetProjectsForSelection",
  ];

  for (const path of attempts) {
    try {
      const r = await fetch(netlifyUrl(path));
      const text = await r.text();
      state.projectsError = (state.projectsError||"") + `\n[${r.status}] ${path}\n${text.slice(0,300)}\n`;
      if (!r.ok) continue;
      let d;
      try { d = JSON.parse(text); } catch { continue; }
      state.projectsRaw = d;
      const list = d.items || d.data || d.projects || d.result || (Array.isArray(d) ? d : null);
      if (list && list.length > 0) {
        state.projects = list.map(p => ({
          ...p,
          id: p.id || p.projectId || p.Id || p.ID,
          name: p.name || p.display || p.projectName || p.title || p.Name || p.ProjectName || "(unnamed)",
        }));
        state.projectsError = null; // clear errors on success
        break;
      }
    } catch(e) {
      state.projectsError = (state.projectsError||"") + `\nFetch error: ${e.message}\n`;
    }
  }

  if (!state.projects.length) {
    state.errorMsg = null; // don't block UI, show in debug instead
  }

  state.loadingProjects = false;
  render();
}

function loadHistory() {
  try { state.history = JSON.parse(localStorage.getItem("synergy-hist") || "[]"); } catch {}
}
function saveHistoryEntry(e) {
  state.history = [e, ...state.history].slice(0, 50);
  try { localStorage.setItem("synergy-hist", JSON.stringify(state.history)); } catch {}
}

async function checkMicPermission() {
  try {
    const r = await navigator.permissions.query({name:"microphone"});
    state.micPermission = r.state;
    r.onchange = () => { state.micPermission = r.state; render(); };
  } catch { state.micPermission = "unknown"; }
  render();
}

async function requestMicPermission() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    stream.getTracks().forEach(t=>t.stop());
    state.micPermission = "granted";
    render();
  } catch {
    state.micPermission = "denied";
    state.errorMsg = "Microphone access denied. In Chrome, tap the 🔒 lock icon in the address bar → Site settings → Microphone → Allow, then reload.";
    setScreen("error");
  }
}

// ── Speech ────────────────────────────────────────────────────────────────────
function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { state.errorMsg = "Voice not supported. Please use Chrome on Android."; setScreen("error"); return; }
  state.transcript = "";
  state.interimText = "";
  setScreen("listening");

  const r = new SR();
  r.lang = "en-AU";
  r.interimResults = true;
  r.continuous = false;
  state.recognition = r;

  r.onend = () => { state.interimText = ""; render(); };
  r.onerror = (e) => {
    state.interimText = "";
    if (e.error === "not-allowed") {
      state.errorMsg = "Microphone permission denied. Please allow mic access and try again.";
    } else {
      state.errorMsg = `Voice error: ${e.error}. Please try again.`;
    }
    setScreen("error");
  };
  r.onresult = (e) => {
    let interim = "", final = "";
    for (const res of e.results) {
      if (res.isFinal) final += res[0].transcript;
      else interim += res[0].transcript;
    }
    state.interimText = interim;
    render();
    if (final) {
      state.transcript = final;
      state.interimText = "";
      r.stop();
      matchToProject(final);
    }
  };
  r.start();
}

function stopListening() {
  state.recognition?.stop();
  setScreen("idle");
}

// ── Smart keyword matching (no API key needed) ────────────────────────────────
function tokenise(str) {
  return (str||"").toLowerCase()
    .replace(/[^a-z0-9\s]/g," ")
    .split(/\s+/)
    .filter(w => w.length > 1 && !["the","and","for","with","on","at","of","to","a","an","in","i","my","been","have","was","working","doing","spent","did"].includes(w));
}

function scoreMatch(tokens, projectName) {
  const pTokens = tokenise(projectName);
  let score = 0;
  for (const t of tokens) {
    for (const p of pTokens) {
      if (p === t) score += 10;          // exact word match
      else if (p.startsWith(t)) score += 6;  // prefix match
      else if (t.startsWith(p)) score += 6;
      else if (p.includes(t) && t.length > 3) score += 3; // substring
    }
  }
  return score;
}

function extractHours(rawText) {
  // Work on the full original text (lowercased), not tokens
  const t = rawText.toLowerCase();

  // Word numbers map including compound forms
  const wordNums = {
    "half": 0.5, "quarter": 0.25,
    "one": 1, "two": 2, "three": 3, "four": 4, "five": 5,
    "six": 6, "seven": 7, "eight": 8,
    "one and a half": 1.5, "two and a half": 2.5, "three and a half": 3.5,
    "an hour and a half": 1.5, "a couple": 2, "couple": 2,
    "couple of hours": 2, "a few hours": 3,
  };

  // Check compound phrases first (longest match wins)
  for (const [phrase, val] of Object.entries(wordNums).sort((a,b) => b[0].length - a[0].length)) {
    const regex = new RegExp(phrase.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + "\\s*(hours?|hrs?)?", "i");
    if (regex.test(t)) {
      // Only count it as hours if "hour" follows, OR phrase itself implies it
      if (phrase.includes("hour") || phrase === "couple of hours" || phrase === "a few hours") return val;
      const m2 = t.match(new RegExp(phrase.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + "\\s*(hours?|hrs?)", "i"));
      if (m2) return val;
    }
  }

  // "X hours Y minutes" e.g. "1 hour 30 minutes"
  const hrMin = t.match(/(\d+(?:\.\d+)?)\s*(?:hours?|hrs?)\s*(?:and\s*)?(\d+)\s*(?:minutes?|mins?)/);
  if (hrMin) return Math.round((parseFloat(hrMin[1]) + parseFloat(hrMin[2])/60) * 4) / 4;

  // Minutes only e.g. "45 minutes", "90 mins"
  const minOnly = t.match(/(\d+(?:\.\d+)?)\s*(?:minutes?|mins?)/);
  if (minOnly) return Math.round((parseFloat(minOnly[1]) / 60) * 4) / 4;

  // Numeric hours e.g. "2 hours", "1.5 hours", "2hrs"
  const hrNum = t.match(/(\d+(?:\.\d+)?)\s*(?:hours?|hrs?)/);
  if (hrNum) return parseFloat(hrNum[1]);

  // "for the last X" or "past X" e.g. "for the last two hours"
  const lastMatch = t.match(/(?:last|past)\s+(\w[\w\s]*?)\s+hours?/);
  if (lastMatch) {
    const w = lastMatch[1].trim();
    const n = {"one":1,"two":2,"three":3,"four":4,"five":5,"half":0.5,"couple":2,"few":3}[w];
    if (n) return n;
  }

  return 1; // default 1 hour if nothing found
}

function extractStage(tokens) {
  const stages = [
    ["documentation","doc","docs","documenting"],
    ["design","designing","schematic","concept","dd"],
    ["construction","ca","site","building","build"],
    ["administration","admin","administrative","management","managing"],
    ["planning","town","council","approval","permit","da"],
    ["interior","interiors","fitout","fit"],
    ["landscape","landscaping","external"],
    ["meetings","meeting","catch","discussion"],
  ];
  const labels = ["Documentation","Design","Construction","Administration","Planning","Interior Design","Landscape","Meetings"];
  for (let i=0; i<stages.length; i++) {
    if (stages[i].some(k => tokens.includes(k))) return labels[i];
  }
  return "Administration";
}

function extractTask(tokens) {
  const tasks = [
    ["documentation","doc","docs","documenting","drawings","drawing","plans","plan","specifications","specs"],
    ["design","designing","concept","schematic","layout"],
    ["meeting","meetings","catch","discussion","call","zoom","teams"],
    ["site","visit","inspection","survey","measure"],
    ["email","emails","correspondence","letter","letters","report","reports"],
    ["admin","administration","invoice","invoicing","fee","fees"],
    ["review","reviewing","checking","checked","markup","mark"],
    ["modelling","model","revit","archicad","cad","3d"],
  ];
  const labels = ["Documentation","Design","Meeting","Site Visit","Correspondence","Administration","Review","Modelling"];
  for (let i=0; i<tasks.length; i++) {
    if (tasks[i].some(k => tokens.includes(k))) return labels[i];
  }
  return "General";
}

function matchToProject(text) {
  setScreen("thinking");
  setTimeout(() => { // slight delay so "thinking" screen renders
    try {
      const tokens = tokenise(text);
      const hours = extractHours(text); // pass full raw text for better matching
      const stageName = extractStage(tokens);
      const taskName = extractTask(tokens);

      // Score every project
      let best = null, bestScore = 0;
      for (const p of state.projects) {
        const name = p.name || p.display || "";
        const score = scoreMatch(tokens, name);
        if (score > bestScore) { bestScore = score; best = p; }
      }

      const confidence = bestScore >= 10 ? "high" : bestScore >= 4 ? "medium" : "low";

      // Build a clean note from the transcript
      const note = text.charAt(0).toUpperCase() + text.slice(1).replace(/\.$/, "") + ".";

      if (!best) {
        state.errorMsg = "Could not match any project. Try saying the project name more clearly.";
        setScreen("error");
        return;
      }

      state.match = {
        projectId: best.id,
        projectName: best.name || best.display,
        stageName,
        taskName,
        hours,
        note,
        confidence,
      };
      setScreen("confirm");
    } catch(e) {
      state.errorMsg = "Matching error: " + e.message;
      setScreen("error");
    }
  }, 400);
}

// ── Log to Synergy ────────────────────────────────────────────────────────────
async function confirmAndLog() {
  setScreen("loading");
  const m = state.match;
  // Try multiple stage endpoint variations
  const stagePaths = [
    `/Projects/${m.projectId}/Stages?criteria.pagesize=100`,
    `/Projects/${m.projectId}/Stages?criteria.pagesize=100&criteria.isActive=true`,
    `/Stages?criteria.projectId=${m.projectId}&criteria.pagesize=100`,
  ];
  let stages = [];
  let stageError = "";
  for (const path of stagePaths) {
    try {
      const r = await fetch(netlifyUrl(path));
      const text = await r.text();
      if (r.ok) {
        const data = JSON.parse(text);
        const sl = (data.items || data || []).filter(s => s.id && Number(s.id) > 0);
        if (sl.length > 0) { stages = sl; break; }
      }
      stageError += `[${r.status}] ${path}\n`;
    } catch(e) {
      stageError += `[ERR] ${path}: ${e.message}\n`;
    }
  }
  if (stages.length === 0) {
    state.errorMsg = "Could not load stages for this project.\n" + stageError + "\nProjectId: " + m.projectId;
    setScreen("error");
    return;
  }
  state.stages = stages;
  state.selectedStageId = null;
  setScreen("stagepick");
}

async function postTimesheet(stageId) {
  setScreen("logging");
  const m = state.match;

  // Build entry - NEVER include stageId unless explicitly a valid positive integer
  const entry = {
    staff_Id: STAFF_ID,
    dateAsInt: todayInt(),
    projectId: m.projectId,
    units: m.hours,
    note: m.note || state.transcript,
  };

  // Only add stageId if it's explicitly passed and valid
  const sid = parseInt(stageId);
  if (!isNaN(sid) && sid > 0) {
    entry.stageId = sid;
  }

  // Verify no zero IDs snuck in
  const safeEntry = {};
  for (const [k,v] of Object.entries(entry)) {
    if (typeof v === "number" && v === 0) continue; // skip zeros
    if (v === null || v === undefined) continue;    // skip nulls
    safeEntry[k] = v;
  }

  const bodyStr = JSON.stringify([safeEntry]);

  let lastError = "";
  let succeeded = false;
  try {
    const result = await synergyFetch("POST", "/Transactions/CreateTimesheetEntry", JSON.parse(bodyStr));
    // Check success field in response
    try {
      const results = JSON.parse(result.text);
      const first = Array.isArray(results) ? results[0] : results;
      if (first && first.success === false) {
        lastError = `[200 but failed] ${first.errorMessage}\nSent: ${bodyStr}`;
      } else {
        succeeded = true;
      }
    } catch { succeeded = true; }
  } catch(e) {
    lastError = `[ERR] ${e.message}\nSent: ${bodyStr}`;
  }

  if (succeeded) {
    saveHistoryEntry({
      id: Date.now(),
      time: fmt(new Date()),
      date: fmtDate(new Date()),
      projectName: m.projectName,
      stageName: m.stageName,
      taskName: m.taskName,
      hours: m.hours,
      note: m.note,
    });
    setScreen("success");
  } else {
    state.errorMsg = "Could not post timesheet. Tried all endpoints:\n" + lastError;
    setScreen("error");
  }
}

// ── Navigation ────────────────────────────────────────────────────────────────
function setScreen(s) { state.screen = s; render(); }
function selectStage(id) { postTimesheet(id); }
function showDebug() { setScreen('debug'); }
function toggleHistory() {
  if (state.screen === "history") setScreen("idle");
  else setScreen("history");
}
function reset() { state.match = null; state.transcript = ""; state.errorMsg = ""; setScreen("idle"); }

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  document.getElementById("histBtn").textContent = state.screen === "history" ? "← BACK" : "HISTORY";
  const main = document.getElementById("main");
  const s = state.screen;

  if (s === "idle") {
    const notGranted = state.micPermission !== "granted";
    const denied = state.micPermission === "denied";
    const btnDisabled = state.loadingProjects || denied;
    main.innerHTML = `
      <div class="screen">
        <div class="proj-count">${state.loadingProjects ? "Loading your projects…" : `${state.projects.length} projects loaded`}</div>

        ${(!denied && notGranted) ? `
        <div class="perm-banner">
          <div class="perm-title">🎤 MICROPHONE ACCESS NEEDED</div>
          <div class="perm-text">This app needs your microphone to record voice entries. Tap below — Chrome will ask for permission.</div>
          <button class="allow-btn" onclick="requestMicPermission()">ALLOW MICROPHONE</button>
        </div>` : ""}

        ${denied ? `
        <div class="perm-banner denied">
          <div class="perm-title denied">🎤 MICROPHONE BLOCKED</div>
          <div class="perm-text denied">Tap the 🔒 lock icon in Chrome's address bar → Site settings → Microphone → Allow, then reload.</div>
        </div>` : ""}

        <div class="mic-wrap">
          <button class="mic-btn" ${btnDisabled?"disabled":""} onclick="${notGranted && !denied ? 'requestMicPermission()' : 'startListening()'}">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="${btnDisabled?'#444':'#0d0d0d'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
            <span class="mic-label">${notGranted && !denied ? "ALLOW" : "SPEAK"}</span>
          </button>
        </div>
        <div class="hint">Tap the button and tell me what you've been working on.<br/>I'll match it to your Total Synergy projects.</div>
        <div style="margin-top:28px">
          <button onclick="showDebug()" style="background:transparent;border:1px solid #222;border-radius:4px;color:#333;font-size:10px;padding:5px 12px;cursor:pointer;letter-spacing:0.08em;">DEBUG: VIEW RAW PROJECTS</button>
        </div>
      </div>`;
  }

  else if (s === "debug") {
    const raw = state.projectsRaw;
    const preview = JSON.stringify(raw, null, 2).slice(0, 3000);
    const count = state.projects.length;
    const sample = state.projects.slice(0,5).map(p=>`<div style="margin-bottom:6px;font-size:11px;color:#aaa;">ID: ${p.id} | NAME: ${p.name}</div>`).join("");
    main.innerHTML = `
      <div class="screen left">
        <div class="section-label" style="margin-bottom:16px">DEBUG — RAW API RESPONSE</div>
        <div style="font-size:12px;color:#f5e642;margin-bottom:8px">${count} projects found after normalisation</div>
        <div style="margin-bottom:16px">${sample || '<div style="color:#555;font-size:11px">No projects normalised</div>'}</div>
        <div style="font-size:10px;color:#444;margin-bottom:8px">RAW JSON (first 3000 chars):</div>
        <pre style="background:#111;border:1px solid #222;border-radius:4px;padding:12px;font-size:10px;color:#666;overflow-x:auto;white-space:pre-wrap;word-break:break-all;max-height:300px;overflow-y:auto">${preview}</pre>
        ${state.projectsError ? `<div style="font-size:10px;color:#e04040;margin-top:12px;margin-bottom:4px">ENDPOINT LOG:</div><pre style="background:#1a0a0a;border:1px solid #e04040;border-radius:4px;padding:12px;font-size:10px;color:#e09090;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto">${state.projectsError}</pre>` : ""}
        <div style="margin-top:20px">
          <button class="solo-btn" onclick="setScreen('idle')">← BACK</button>
        </div>
      </div>`;
  }

  else if (s === "listening") {
    main.innerHTML = `
      <div class="screen">
        <div class="mic-wrap">
          <div class="ring" style="animation-delay:0s"></div>
          <div class="ring" style="animation-delay:0.5s"></div>
          <div class="ring" style="animation-delay:1s"></div>
          <button class="stop-btn" onclick="stopListening()">
            <div class="stop-square"></div>
            <span class="stop-label">STOP</span>
          </button>
        </div>
        <div class="listening-label">Listening…</div>
        <div class="interim">${state.interimText || "Speak now — tell me what you've been working on"}</div>
      </div>`;
  }

  else if (s === "thinking") {
    main.innerHTML = `
      <div class="screen">
        <div class="spinner"></div>
        <div class="thinking-label">MATCHING TO PROJECTS</div>
        <div class="thinking-quote">"${state.transcript}"</div>
      </div>`;
  }

  else if (s === "confirm" && state.match) {
    const m = state.match;
    main.innerHTML = `
      <div class="screen left">
        <div class="section-label">YOU SAID</div>
        <div class="quote-box">"${state.transcript}"</div>
        <div class="section-label">LOG THIS ENTRY?</div>
        <div class="match-card">
          ${[["PROJECT",m.projectName],["STAGE",m.stageName],["TASK",m.taskName],["HOURS",m.hours+"h"],["NOTE",m.note]].map(([k,v])=>`
          <div class="match-row"><div class="match-key">${k}</div><div class="match-val">${v||"—"}</div></div>`).join("")}
          ${m.confidence==="low"?`<div class="low-conf">⚠ Low confidence — please review before logging</div>`:""}
        </div>
        <div class="btn-row">
          <button class="btn" onclick="reset()">CANCEL</button>
          <button class="btn" onclick="startListening()">RE-SPEAK</button>
          <button class="btn primary" onclick="confirmAndLog()">✓ LOG IT</button>
        </div>
      </div>`;
  }

  else if (s === "loading") {
    main.innerHTML = `
      <div class="screen">
        <div class="spinner"></div>
        <div class="thinking-label">LOADING STAGES…</div>
      </div>`;
  }

  else if (s === "stagepick") {
    const m = state.match;
    const stages = state.stages;
    main.innerHTML = `
      <div class="screen left">
        <div class="section-label" style="margin-bottom:6px">PROJECT</div>
        <div style="font-size:14px;color:#e8e2d9;margin-bottom:20px">${m.projectName}</div>
        <div class="section-label" style="margin-bottom:6px">${m.hours}h · ${m.note}</div>
        <div class="section-label" style="margin-top:16px;margin-bottom:12px">PICK A STAGE</div>
        ${stages.length === 0
          ? `<div class="empty" style="margin-bottom:20px">No stages found — will log without stage.</div>`
          : `<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px">
              ${stages.map(s => `
                <button onclick="selectStage(${s.id})" style="
                  background:#131313;border:1px solid #2a2a2a;border-radius:4px;
                  color:#e8e2d9;font-family:'DM Mono',monospace;font-size:13px;
                  padding:12px 16px;text-align:left;cursor:pointer;
                  transition:all 0.15s;
                ">${s.name || s.display || 'Stage ' + s.id}</button>
              `).join("")}
            </div>`
        }
        <div class="btn-row">
          <button class="btn" onclick="setScreen('confirm')">← BACK</button>
          <button class="btn primary" onclick="postTimesheet(null)">SKIP STAGE</button>
        </div>
      </div>`;
  }

  else if (s === "logging") {
    main.innerHTML = `
      <div class="screen">
        <div class="spinner"></div>
        <div class="thinking-label">POSTING TO TOTAL SYNERGY…</div>
      </div>`;
  }

  else if (s === "success") {
    const m = state.match;
    main.innerHTML = `
      <div class="screen">
        <div class="big-icon ok">✓</div>
        <div class="success-title">LOGGED!</div>
        <div class="success-sub">${m?.projectName||""}</div>
        <div class="success-sub" style="margin-bottom:32px">${m?.hours||""}h · ${m?.taskName||""}</div>
        <button class="solo-btn" onclick="reset()">LOG ANOTHER</button>
      </div>`;
  }

  else if (s === "error") {
    main.innerHTML = `
      <div class="screen">
        <div class="big-icon err">✕</div>
        <div class="err-title">SOMETHING WENT WRONG</div>
        <div class="err-msg">${state.errorMsg}</div>
        <button class="solo-btn" onclick="reset()">TRY AGAIN</button>
      </div>`;
  }

  else if (s === "history") {
    const entries = state.history;
    main.innerHTML = `
      <div class="screen left">
        <div class="section-label" style="margin-bottom:20px">RECENT ENTRIES</div>
        ${entries.length === 0
          ? `<div class="empty">No entries logged yet.</div>`
          : entries.map(e=>`
            <div class="hist-card">
              <div class="hist-top">
                <div class="hist-time">${e.time} · ${e.date}</div>
                <div class="hist-hrs">${e.hours}h</div>
              </div>
              <div class="hist-proj">${e.projectName}</div>
              <div class="hist-stage">${e.stageName} · ${e.taskName}</div>
              ${e.note?`<div class="hist-note">${e.note}</div>`:""}
            </div>`).join("")
        }
      </div>`;
  }
}

init();
</script>
